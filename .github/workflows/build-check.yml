name: Build Check

# Se ejecuta en cada push a main y en pull requests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Verificar build (vite build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activar pnpm vía corepack (integrado en Node, sin acciones externas)
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Instalar dependencias (idéntico a lo que hace Vercel)
        run: pnpm install --frozen-lockfile

      # NOTA: tsc --noEmit se deja como aviso, no bloquea el merge.
      # El proyecto tiene ~80 errores de tipos preexistentes (Job, Notification,
      # TimeEntry, etc.) que nunca han roto el build real, porque Vercel tampoco
      # los comprueba (vite build no hace type-check estricto). Bloquear con esto
      # ahora dejaría el CI en rojo permanentemente. Cuando se vaya arreglando esa
      # deuda de tipos, se puede quitar "continue-on-error" para hacerlo bloqueante.
      - name: Comprobar tipos de TypeScript (informativo, no bloquea)
        continue-on-error: true
        run: pnpm exec tsc --noEmit

      - name: Build de producción (vite build) — esto SÍ bloquea, es lo que corre Vercel
        run: pnpm run build

      - name: ✅ Build correcto
        if: success()
        run: echo "El build pasó sin errores. Seguro para desplegar."
